# .goreleaser.yaml
version: 2

before:
  hooks:
    - go mod tidy
    - go fmt ./...

builds:
  - id: cue
    main: .
    binary: cue
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - formats: [tar.gz]
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - LICENSE
      - README.md
      - config.example.yaml

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - 'README'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: SuperCoolPencil
    name: cue
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Cue Release {{ .Tag }}
    
    Welcome to the latest version of Cue!
  footer: |
    ---
    Built with [GoReleaser](https://goreleaser.com)
